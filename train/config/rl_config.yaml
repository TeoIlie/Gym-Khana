# This file contains RL-specific hyperparameters for PPO training

# seeds for reproducibility
seed: 52
eval_seed: 1000

n_envs: 128  # number of parallel environments for training
total_timesteps: 100000000  # timesteps
n_steps: 4096  # Number of steps per rollout per environment
start_learning_rate: 0.0003 # initial learning rate
end_learning_rate: 0.0001 # final learning rate, with linear decay
act_func_neg_slope: 0.2  # actor, critic LeakyReLU negative slope
use_custom_relu: false   # if true, use LeakyReLU (with act_func_neg_slope) instead of default Tanh
actor_layer_size: 64     # hidden layer size for actor (pi) network (2 layers)
critic_layer_size: 64    # hidden layer size for critic (vf) network (2 layers)

# Transfer/continue training defaults (mode 'f')
additional_timesteps: 100000000  # additional timesteps for transfer/continue training
transfer_reset_log_std: -0.5  # reset log_std to this value; use null to skip reset
transfer_reset_critic: true  # reinitialize critic to random weights
