# This file contains training-specific gym parameters.
# Additional defaults in public `gymkhana.drift_config` preset

# =================================
#   DEFAULT AND DRIFT/RACE CONFIG
# =================================

# Environment
project_name: "f1tenth-ppo-drift"
race_training_mode: "race"

# LiDAR beams config - keep minimal for fast training, as it isn't needed
num_beams: 2

# Map
map: "Drift"
# Multi-map training (optional)
# If specified, parallel environments will train on different maps from this list
# See /train/training_utils.py make_subprocvecenv
track_pool:
  - "Drift"
  - "Drift_mirror"
  # - "Drift2"
  # - "Drift2_mirror"
# For single-map training, set to null or comment out:
# track_pool: null

# Observation
record_obs_min_max: true
sparse_width_obs: true

# Reset configuration
track_direction: "random"
prevent_instability: true # enables integration instability checking with reset

# Rendering/Debug settings
test_debug_render: true
train_debug_render: false

# Callback config
ckpt_save_freq: 10000 # reused for EvalCallback and custom CurriculumLearningCallback
n_eval_episodes: 5

# =================================
#   RECOVERY MODE CONFIG
# =================================

recovery_project_name: "f1tenth-ppo-recover"
recovery_training_mode: "recover"
recovery_track_pool: null # train only on IMS

# Curriculum learning - gradually expand recovery state ranges
curriculum:
  # see train/callbacks.py for more details about parameter uses
  enabled: false
  n_stages: 6
  window_size: 500
  success_threshold: 0.8
  min_episodes_between_expansions: 1000
  max_curriculum_timestep: null
  # Each range: [initial_lo, initial_hi, max_lo, max_hi]
  v_range:    [5.0, 9.0, 2.0, 12.0]
  beta_range: [-0.10, 0.10, -0.349, 0.349]
  r_range:    [-0.20, 0.20, -0.785, 0.785]
  yaw_range:  [-0.20, 0.20, -0.785, 0.785]
